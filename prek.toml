default_install_hook_types = ["pre-commit"]
fail_fast = false

[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace" },
  { id = "check-json" },
  { id = "check-toml" },
  { id = "end-of-file-fixer" },
]

[[repos]]
repo = "local"
hooks = [
  {
    id = "biome-check",
    name = "Biome check",
    language = "system",
    entry = "bunx biome check --config-path cli/biome.json --write",
    files = "cli/.*\\.(ts|tsx|js|jsx|json)$",
    pass_filenames = true,
  },
  {
    id = "typecheck",
    name = "TypeScript typecheck",
    language = "system",
    entry = "bunx tsc --noEmit -p cli/tsconfig.json",
    files = "cli/.*\\.(ts|tsx)$",
    pass_filenames = false,
    always_run = true,
  },
]
